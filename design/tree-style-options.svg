<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <style>
      text {
        font-family: "Avenir Next Rounded", "PingFang SC", sans-serif;
        fill: #2b2724;
      }
      .card {
        fill: #fff8e9;
        stroke: #2b2724;
        stroke-width: 2;
      }
      .stage-box {
        fill: #fffdf6;
        stroke: rgba(43, 39, 36, 0.22);
        stroke-width: 1;
      }
      .tree {
        fill: #161616;
        stroke: #161616;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .ghost {
        fill: none;
        stroke: #161616;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .label {
        font-size: 24px;
        font-weight: 800;
      }
      .hint {
        font-size: 15px;
        font-weight: 700;
        fill: rgba(43, 39, 36, 0.68);
      }
      .percent {
        font-size: 14px;
        font-weight: 800;
        fill: rgba(43, 39, 36, 0.58);
      }
    </style>
  </defs>

  <rect width="1180" height="760" rx="34" fill="#f6ead8"/>
  <text x="54" y="64" class="label">菜单栏五阶段树图标风格候选</text>
  <text x="54" y="92" class="hint">全部按 macOS 菜单栏单色 template icon 设计：小尺寸优先，之后可接入动态 tray canvas。</text>

  <g transform="translate(54 130)">
    <g>
      <rect class="card" width="1072" height="104" rx="20"/>
      <text x="24" y="38" class="label">A 圆润幼苗</text>
      <text x="24" y="66" class="hint">最贴近现在的软萌风，树冠圆，识别稳定。</text>
