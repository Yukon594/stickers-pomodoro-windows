        <g transform="translate(378 0)"><rect class="stage-box" width="94" height="72" rx="14"/><text x="28" y="88" class="percent">75%</text><g transform="translate(47 56) scale(1.28)"><rect class="tree" x="-1.5" y="-17" width="3" height="17"/><circle class="tree" cx="0" cy="-27" r="9"/><circle class="tree" cx="-8" cy="-20" r="6"/><circle class="tree" cx="8" cy="-20" r="6"/></g></g>
        <g transform="translate(504 0)"><rect class="stage-box" width="94" height="72" rx="14"/><text x="24" y="88" class="percent">100%</text><g transform="translate(47 58) scale(1.12)"><rect class="tree" x="-2" y="-22" width="4" height="22"/><circle class="tree" cx="0" cy="-35" r="11"/><circle class="tree" cx="-10" cy="-26" r="8"/><circle class="tree" cx="10" cy="-26" r="8"/><circle class="tree" cx="0" cy="-24" r="8"/></g></g>
