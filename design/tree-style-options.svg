      <text x="24" y="66" class="hint">像盖章贴纸，亲和力强；小尺寸比 A 更有装饰感。</text>
      <g transform="translate(360 16)">
        <g transform="translate(0 0)"><rect class="stage-box" width="94" height="72" rx="14"/><text x="33" y="88" class="percent">0%</text><g transform="translate(47 53) scale(1.65)"><path class="ghost" stroke-width="2" d="M-7 2c4-3 10-3 14 0"/><rect class="tree" x="-1" y="-7" width="2" height="7"/><path class="tree" d="M1-10c4-3 7-1 8 2-4 2-7 1-8-2z"/></g></g>
