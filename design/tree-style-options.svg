      <text x="24" y="66" class="hint">最像“从树苗到参天树”，轮廓利落，菜单栏识别强。</text>
      <g transform="translate(360 16)">
        <g transform="translate(0 0)"><rect class="stage-box" width="94" height="72" rx="14"/><text x="33" y="88" class="percent">0%</text><g transform="translate(47 55) scale(1.55)"><path class="tree" d="M0-15l5 8h-3l4 6h-12l4-6h-3z"/><rect class="tree" x="-1" y="-2" width="2" height="4"/></g></g>
