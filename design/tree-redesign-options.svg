<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1020" viewBox="0 0 760 1020">
  <defs>
    <style>
      :root {
        color-scheme: light;
      }
      .page {
        fill: #fff8eb;
      }
      .title {
        fill: #2d2925;
        font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 24px;
        font-weight: 800;
      }
      .subtitle {
        fill: #7d7468;
        font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 13px;
        font-weight: 600;
      }
      .row-title {
        fill: #2d2925;
        font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 17px;
        font-weight: 800;
      }
      .row-note,
      .percent {
        fill: #7d7468;
        font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 12px;
        font-weight: 700;
      }
      .card {
        fill: #fffdf5;
        stroke: #2d2925;
        stroke-width: 2;
      }
      .ink {
        fill: #2d2925;
      }
      .line {
        stroke: #2d2925;
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .ghost {
        stroke: #c9bba9;
        stroke-width: 1.6;
        stroke-linecap: round;
        fill: none;
      }
      .tag {
        fill: #72c49d;
      }
      .tag-text {
        fill: #2d2925;
        font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </defs>

  <rect class="page" width="760" height="1020"/>
  <text class="title" x="36" y="42">菜单栏树图标重设计候选</text>
  <text class="subtitle" x="36" y="66">每组都是 0% / 25% / 50% / 75% / 100%，按 18x18 菜单栏安全画布设计。</text>

  <g transform="translate(36 92)">
    <text class="row-title" x="0" y="0">像素 A：枝干常驻</text>
    <text class="row-note" x="130" y="22">树干一直清楚，树冠按层增加，适合小尺寸。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 55) scale(3)"><rect class="ink" x="-0.5" y="-4" width="1" height="4"/><rect class="ink" x="-2" y="-6" width="4" height="2"/><rect class="ink" x="-1" y="-8" width="2" height="2"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 56) scale(2.7)"><rect class="ink" x="-0.75" y="-6" width="1.5" height="6"/><rect class="ink" x="-3" y="-8" width="6" height="2"/><rect class="ink" x="-2" y="-11" width="4" height="3"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 57) scale(2.35)"><rect class="ink" x="-1" y="-8" width="2" height="8"/><rect class="ink" x="-4" y="-10" width="8" height="2"/><rect class="ink" x="-3" y="-13" width="6" height="3"/><rect class="ink" x="-2" y="-16" width="4" height="3"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 58) scale(2.05)"><rect class="ink" x="-1" y="-10" width="2" height="10"/><rect class="ink" x="-5" y="-12" width="10" height="2"/><rect class="ink" x="-4" y="-15" width="8" height="3"/><rect class="ink" x="-3" y="-18" width="6" height="3"/><rect class="ink" x="-1.5" y="-21" width="3" height="3"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 59) scale(1.85)"><rect class="ink" x="-1.2" y="-12" width="2.4" height="12"/><rect class="ink" x="-6" y="-14" width="12" height="2"/><rect class="ink" x="-5" y="-17" width="10" height="3"/><rect class="ink" x="-4" y="-20" width="8" height="3"/><rect class="ink" x="-2.5" y="-23" width="5" height="3"/><rect class="ink" x="-1" y="-26" width="2" height="3"/></g></g>
    </g>
  </g>

  <g transform="translate(36 238)">
    <text class="row-title" x="0" y="0">像素 B：苹果树块面</text>
    <text class="row-note" x="142" y="22">不是越长越糊成一团，而是从芽、枝、冠逐渐成形。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 56) scale(3)"><rect class="ink" x="-0.5" y="-5" width="1" height="5"/><rect class="ink" x="0.5" y="-7" width="2.5" height="2"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 57) scale(2.65)"><rect class="ink" x="-0.75" y="-7" width="1.5" height="7"/><rect class="ink" x="-3" y="-10" width="4" height="3"/><rect class="ink" x="1" y="-12" width="4" height="4"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 58) scale(2.25)"><rect class="ink" x="-1" y="-9" width="2" height="9"/><rect class="ink" x="-5" y="-13" width="5" height="5"/><rect class="ink" x="0" y="-16" width="6" height="6"/><rect class="ink" x="-2" y="-18" width="4" height="4"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 59) scale(1.95)"><rect class="ink" x="-1.2" y="-11" width="2.4" height="11"/><rect class="ink" x="-7" y="-15" width="6" height="6"/><rect class="ink" x="-2" y="-20" width="7" height="7"/><rect class="ink" x="4" y="-16" width="6" height="6"/><rect class="ink" x="-4" y="-18" width="5" height="5"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 60) scale(1.75)"><rect class="ink" x="-1.4" y="-13" width="2.8" height="13"/><rect class="ink" x="-8" y="-17" width="7" height="7"/><rect class="ink" x="-4" y="-22" width="8" height="8"/><rect class="ink" x="3" y="-18" width="7" height="7"/><rect class="ink" x="-8" y="-12" width="6" height="5"/><rect class="ink" x="2" y="-12" width="6" height="5"/></g></g>
    </g>
  </g>

  <g transform="translate(36 384)">
    <text class="row-title" x="0" y="0">像素 C：小果园牌</text>
    <text class="row-note" x="130" y="22">更可爱，底部有稳定树干和小土台，菜单栏更有“种下”的感觉。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 58) scale(2.8)"><rect class="ink" x="-0.5" y="-5" width="1" height="5"/><rect class="ink" x="-3" y="0" width="6" height="1"/><rect class="ink" x="0.5" y="-7" width="2.5" height="2"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 58) scale(2.45)"><rect class="ink" x="-0.7" y="-7" width="1.4" height="7"/><rect class="ink" x="-4" y="0" width="8" height="1.2"/><rect class="ink" x="-3" y="-10" width="3" height="3"/><rect class="ink" x="0" y="-12" width="4" height="4"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 59) scale(2.15)"><rect class="ink" x="-0.9" y="-9" width="1.8" height="9"/><rect class="ink" x="-5" y="0" width="10" height="1.4"/><rect class="ink" x="-5" y="-13" width="5" height="5"/><rect class="ink" x="0" y="-15" width="5" height="5"/><rect class="ink" x="-2" y="-18" width="4" height="4"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 60) scale(1.9)"><rect class="ink" x="-1.1" y="-11" width="2.2" height="11"/><rect class="ink" x="-6" y="0" width="12" height="1.6"/><rect class="ink" x="-7" y="-15" width="6" height="6"/><rect class="ink" x="-2" y="-20" width="7" height="7"/><rect class="ink" x="4" y="-16" width="6" height="6"/><rect class="ink" x="-4" y="-12" width="5" height="4"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 61) scale(1.7)"><rect class="ink" x="-1.3" y="-13" width="2.6" height="13"/><rect class="ink" x="-7" y="0" width="14" height="1.8"/><rect class="ink" x="-8" y="-17" width="7" height="7"/><rect class="ink" x="-4" y="-23" width="8" height="8"/><rect class="ink" x="3" y="-18" width="7" height="7"/><rect class="ink" x="-8" y="-11" width="6" height="5"/><rect class="ink" x="2" y="-12" width="6" height="5"/></g></g>
    </g>
  </g>

  <g transform="translate(36 548)">
    <text class="row-title" x="0" y="0">松树 A：层枝生长</text>
    <text class="row-note" x="130" y="22">每阶段增加枝层，不只是整体放大。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 60) scale(2.7)"><path class="ink" d="M0-10l4 5h-2.2l3 4h-10l3-4H-4z"/><rect class="ink" x="-0.65" y="-1" width="1.3" height="3"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 61) scale(2.25)"><path class="ink" d="M0-14l4.5 5.2H1.8l4 4.8H-6l4-4.8h-2.7z"/><rect class="ink" x="-0.75" y="-1.2" width="1.5" height="3.8"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 62) scale(1.95)"><path class="ink" d="M0-19l5.2 5.7H2.4l4.8 5.4H3.8l5 5.9H-8.8l5-5.9h-3.4l4.8-5.4h-2.8z"/><rect class="ink" x="-0.9" y="-2" width="1.8" height="5"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 63) scale(1.7)"><path class="ink" d="M0-25l6 6.3H2.8l5.8 6.4H4.3l6.2 6.7H6l4.6 5.6h-21.2L-6-5.6h-4.5l6.2-6.7h-4.3l5.8-6.4H-6z"/><rect class="ink" x="-1" y="-1.5" width="2" height="5.5"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 64) scale(1.5)"><path class="ink" d="M0-31l6.8 7H3.2l6.5 7H5l7.3 7.5H6.5l6 7.2h-25l6-7.2h-5.8L-5-17h-4.7l6.5-7H-6.8z"/><rect class="ink" x="-1.15" y="-2.3" width="2.3" height="6.6"/></g></g>
    </g>
  </g>

  <g transform="translate(36 694)">
    <text class="row-title" x="0" y="0">松树 B：幼苗到塔形</text>
    <text class="row-note" x="142" y="22">前两阶段保留幼苗感，后面逐渐变成松树。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 60) scale(2.8)"><rect class="ink" x="-0.5" y="-5" width="1" height="5"/><path class="ink" d="M0-6c3-2 5-.8 6 1.2-3 1.3-5 .6-6-1.2z"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 61) scale(2.35)"><rect class="ink" x="-0.6" y="-7" width="1.2" height="7"/><path class="ink" d="M0-9c3.5-2.5 6-1 7 1.3-3.5 1.6-6 .7-7-1.3zM0-7c-3.3-2-5.5-.5-6.5 1.4 3 1.3 5.4.6 6.5-1.4z"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 62) scale(2.02)"><path class="ink" d="M0-18l5.5 6H2.5l5 5.8H-7.5l5-5.8h-3z"/><rect class="ink" x="-0.85" y="-6" width="1.7" height="8"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 63) scale(1.72)"><path class="ink" d="M0-25l6.3 6.7H2.8l6.5 7H4.2l6.4 7.2H-10.6l6.4-7.2h-5.1l6.5-7H-6.3z"/><rect class="ink" x="-1" y="-4" width="2" height="7"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 64) scale(1.5)"><path class="ink" d="M0-31l7 7.2H3.2l7.2 7.5H5l7.5 8H6.5l6.2 7H-12.7l6.2-7h-6l7.5-8h-5.4l7.2-7.5H-7z"/><rect class="ink" x="-1.15" y="-2" width="2.3" height="6.5"/></g></g>
    </g>
  </g>

  <g transform="translate(36 840)">
    <text class="row-title" x="0" y="0">松树 C：精细剪纸</text>
    <text class="row-note" x="130" y="22">更像系统 template icon，细节克制，阶段靠枝层和底座变化。</text>
    <g transform="translate(0 38)">
      <g transform="translate(0 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="42" y="98">0%</text><g transform="translate(56 59) scale(2.75)"><path class="line" d="M0 1v-9M0-8l-4 5M0-8l4 5"/></g></g>
      <g transform="translate(132 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">25%</text><g transform="translate(56 60) scale(2.35)"><path class="line" d="M0 1v-13M0-12l-5 5M0-12l5 5M0-7l-4 4M0-7l4 4"/></g></g>
      <g transform="translate(264 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">50%</text><g transform="translate(56 61) scale(2.05)"><path class="line" d="M0 2v-18M0-16l-6 5M0-16l6 5M0-10l-5 4.5M0-10l5 4.5M0-5l-4 3.5M0-5l4 3.5"/></g></g>
      <g transform="translate(396 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="36" y="98">75%</text><g transform="translate(56 62) scale(1.8)"><path class="line" d="M0 2v-23M0-21l-7 6M0-21l7 6M0-14l-6 5.5M0-14l6 5.5M0-8l-5 4.5M0-8l5 4.5M-4 2h8"/></g></g>
      <g transform="translate(528 0)"><rect class="card" width="112" height="80" rx="14"/><text class="percent" x="32" y="98">100%</text><g transform="translate(56 63) scale(1.6)"><path class="line" d="M0 3v-29M0-26l-8 6.5M0-26l8 6.5M0-18l-7 6M0-18l7 6M0-11l-6 5M0-11l6 5M0-5l-5 4M0-5l5 4M-5 3h10"/></g></g>
    </g>
  </g>
</svg>
