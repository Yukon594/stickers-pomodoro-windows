    </g>
  </g>

  <g transform="translate(64 550)">
    <rect class="panel" width="1192" height="138" rx="20"/>
    <text class="label" x="28" y="42">C. Charging Halo</text>
    <text class="note" x="28" y="72">Closest to the current circular timer language: the ring quietly fills around a bolt.</text>
