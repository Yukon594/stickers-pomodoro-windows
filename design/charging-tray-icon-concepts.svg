    </g>
    <g transform="translate(930 32)">
      <use href="#battery-4"/>
      <text class="tiny" x="-14" y="75">100%</text>
    </g>
  </g>

  <g transform="translate(64 388)">
    <rect class="panel" width="1192" height="138" rx="20"/>
    <text class="label" x="28" y="42">B. Plug Spark</text>
    <text class="note" x="28" y="72">Cute and active: a plug settles into a spark, then becomes fully charged.</text>
    <g transform="translate(410 32)">
      <use href="#plug-0"/>
      <text class="tiny" x="-6" y="75">0%</text>
    </g>
    <g transform="translate(540 32)">
