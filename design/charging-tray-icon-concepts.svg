    </g>
  </g>

  <g transform="translate(64 712)">
    <rect class="panel" width="1192" height="138" rx="20"/>
    <text class="label" x="28" y="42">D. Rest Capsule</text>
    <text class="note" x="28" y="72">Softest version: a rounded energy capsule fills up, less technical than a battery.</text>
