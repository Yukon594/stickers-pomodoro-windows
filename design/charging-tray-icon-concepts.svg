<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900">
  <defs>
    <style>
      .bg { fill: #fbf7f1; }
      .panel { fill: #fffaf3; stroke: #eaded0; stroke-width: 2; }
      .strip { fill: #f5eee6; stroke: #e4d7c9; stroke-width: 1.5; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 34px; font-weight: 700; fill: #3b3028; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 18px; fill: #7a6a5e; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 22px; font-weight: 700; fill: #3b3028; }
      .note { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 16px; fill: #75685f; }
      .tiny { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; fill: #8b7d72; }
      .menu-text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 16px; fill: #4a3e36; }
      .icon { fill: none; stroke: #111; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; }
      .solid { fill: #111; stroke: none; }
      .soft { fill: #111; opacity: .18; stroke: none; }
      .accent { fill: #e8c986; stroke: none; opacity: .55; }
      .dash { fill: none; stroke: #111; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 2.5 4; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="900"/>
  <text class="title" x="64" y="70">Rest Countdown Charging Icon Concepts</text>
  <text class="sub" x="64" y="102">Monochrome 18x18 menu-bar template icon directions. Each row shows 0%, 25%, 50%, 75%, and 100% rest progress.</text>

  <g transform="translate(64 135)">
    <rect class="strip" x="0" y="0" width="1192" height="54" rx="14"/>
    <circle cx="32" cy="27" r="7" fill="#d77064"/>
    <circle cx="56" cy="27" r="7" fill="#e4b64e"/>
    <circle cx="80" cy="27" r="7" fill="#70b17b"/>
    <text class="menu-text" x="112" y="33">Sticker Pomodoro</text>
    <g transform="translate(1014 18) scale(.72)">
      <use href="#battery-3"/>
    </g>
    <text class="menu-text" x="1045" y="33">03:48 · 2 trees</text>
  </g>

  <g transform="translate(64 226)">
    <rect class="panel" width="1192" height="138" rx="20"/>
    <text class="label" x="28" y="42">A. Battery Fill</text>
    <text class="note" x="28" y="72">Most literal and readable: the battery fills as the break restores energy.</text>
    <g transform="translate(410 32)">
      <use href="#battery-0"/>
      <text class="tiny" x="-6" y="75">0%</text>
    </g>
    <g transform="translate(540 32)">
      <use href="#battery-1"/>
      <text class="tiny" x="-10" y="75">25%</text>
    </g>
    <g transform="translate(670 32)">
